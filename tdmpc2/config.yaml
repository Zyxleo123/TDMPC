defaults:
    - override hydra/launcher: submitit_local

# environment
task: dog-run
obs: state
# obs_nframes: 3
#
# environment
waypoint_bonus: 100.
heading_penalty: 25.
distance_bonus: 1.
distance_cutoff: 0.25

# evaluation
checkpoint: ???
save_dataset: True
eval_episodes: 5 # TODO: 10
eval_pi: True # TODO: False
eval_value: True # TODO: False
eval_freq: 2000

# training
n_updates: 1 # number of gradient updates per environment step
steps: 1_000_000 # TODO: 2_000_000 for hard tasks
batch_size: 256
log_freq: 4 #4 for driving, 1 for other tasks
reward_coef: 0.1
value_coef: 0.1
consistency_coef: 20
rho: 0.5
lr: 3e-4
enc_lr_scale: 0.3
grad_clip_norm: 20
tau: 0.01
discount_denom: 5
discount_min: 0.95
discount_max: 0.995
buffer_size: 1_000_000
data_dir: ???
dyna: False
dyna_coef: 0.0 # 0.05
reward_decay: 0.0 # exponential decay for sparse rewards; 0.0 = disabled
# priority buffer (Z-score peak detection)
priority_buffer_ratio: 0.0   # fraction of batch from priority buffer; 0.0 = disabled
priority_buffer_k: 2.0       # Z-score threshold for peak detection
priority_buffer_window: 20    # steps before peak to include in snippet
priority_buffer_size: 100_000 # capacity of priority buffer in steps; smaller = more recency bias
reward_ema_alpha: 0.95       # EMA decay for running reward statistics
# exp mode
exp_name: default
record_q_scale: true # record curve of action value scale
record_pi_q_scale: false # record curve of policy action value scale
use_pi_prob: 0.0 # use policy probability to calculate action value

# training slice
train_horizon: 3          # length of each training subsequence sampled from replay buffer

# planning
planner_mode: "default" # ["default", "loop"]
mpc: true
iterations: 6
num_samples: 512
num_elites: 64
num_pi_trajs: 24
horizon: 3
time_chunk_size: 1
min_std: 0.05
max_std: 2
temperature: 0.5

# actor
actor_mode: "sac"  # ["sac", "residual", "bc_sac", "awac", "awac_sac", "bc", "residual_qw", "bc_sac_mean"]
log_std_min: -10
log_std_max: 2
prior_coef: 1.0
scale_threshold: 2.0
entropy_coef: 1e-4
awac_lambda: 0.3333
exp_adv_min: 0.1
exp_adv_max: 10.0

# critic
num_bins: 101
vmin: -10
vmax: +10

# Value;
v_loss_type: "asy_l2" # ["soft_ce", "asy_l2"]
v_tau: 0.9 # NOTE: only applicable for "asy_l2" loss, 0.5 equals to L2 loss.

# architecture
model_size: ???
num_enc_layers: 2
enc_dim: 256
num_channels: 32
mlp_dim: 512
latent_dim: 512
task_dim: 96
num_q: 5
dropout: 0.01
simnorm_dim: 8
reward_norm: false

# logging
wandb_project: humanoid-bench
wandb_entity: zyxleo
wandb_silent: false
disable_wandb: true
save_csv: true
save_freq: 20000
save_trajectories: true

# misc
save_video: true
save_agent: true
seed: 1
resume: False
resume_dir: None

# convenience
work_dir: ???
task_title: ???
multitask: ???
tasks: ???
obs_shape: ???
action_dim: ???
episode_length: ???
obs_shapes: ???
action_dims: ???
episode_lengths: ???
seed_steps: ???
bin_size: ???

# humanoid envs
policy_path: ???
mean_path: ???
var_path: ???
policy_type: ???
small_obs: ???

# VTN Pre-trained weights (optional)
vtn_pretrained_path: ???
vtn_hidden_dim: ???
